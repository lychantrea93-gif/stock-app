<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { color: #0088cc; margin: 0 0 10px 0; font-size: 16px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-top: 8px; }
        input, select { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .btn-add { background: #ff9800; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-submit { background: #0088cc; color: white; border: none; width: 100%; padding: 18px; border-radius: 8px; font-weight: bold; margin-top: 20px; font-size: 16px; cursor: pointer; }
        .cart-item { background: #eef9ff; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 14px; border-left: 5px solid #0088cc; }
        .results { border: 1px solid #ddd; max-height: 150px; overflow-y: auto; display: none; background: white; position: absolute; width: calc(100% - 50px); z-index: 100; border-radius: 8px; }
        .item-row { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3>📝 ព័ត៌មានបុង</h3>
    <label>ថ្ងៃខែ:</label>
    <input type="date" id="formDate">
    <label>ដេប៉ូ:</label>
    <select id="depotList"></select>
    <label>តំបន់:</label>
    <select id="zoneList"></select>
</div>

<div class="card">
    <h3>📦 បញ្ចូលទំនិញ (ជ្រើសរើសតាមឈ្មោះ)</h3>
    <input type="text" id="itemSearch" placeholder="វាយរកឈ្មោះទំនិញ..." onkeyup="searchItem()">
    <div id="resBox" class="results"></div>
    <input type="number" id="qty" placeholder="ចំនួន..." style="margin-top: 10px;">
    <button class="btn-add" onclick="addToCart()">➕ ថែមចូលបញ្ជី</button>
    <div id="cartList" style="margin-top: 15px;"></div>
</div>

<div class="card">
    <h3>📸 ថតរូបបុង (Max 10)</h3>
    <input type="file" id="photoFile" accept="image/*" capture="environment" multiple>
    <button class="btn-submit" id="btnAll" onclick="submitAll()">💾 រក្សាទុក និងផ្ញើទៅ Group</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwioyAyzWgh2U0zV5TaWYCk8nQZ2EAzvZ9e-1I6rv8czvPgtUvKpXU2aMJyCQGJw5Z/exec";
    const BOT_TOKEN = "8627994315:AAFAsEe3IlsHx7r4K1jExKbB4ETu_F4eDOk";
    const GROUP_ID = "-1003907340354";

    let db = { items: [] }, cart = [], selectedItem = null;

    document.getElementById('formDate').valueAsDate = new Date();

    fetch(SCRIPT_URL).then(r => r.json()).then(res => {
        db = res;
        const dList = document.getElementById('depotList');
        const zList = document.getElementById('zoneList');
        res.depots.forEach(d => dList.add(new Option(d, d)));
        res.zones.forEach(z => zList.add(new Option(z, z)));
    });

    function searchItem() {
        const val = document.getElementById('itemSearch').value.toLowerCase();
        const box = document.getElementById('resBox');
        box.innerHTML = '';
        if (val.length < 1) { box.style.display = 'none'; return; }
        db.items.filter(i => i.name.toLowerCase().includes(val)).slice(0, 10).forEach(i => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `<strong>${i.name}</strong>`;
            div.onclick = () => { 
                selectedItem = i; 
                document.getElementById('itemSearch').value = i.name; 
                box.style.display = 'none'; 
            };
            box.appendChild(div);
        });
        box.style.display = 'block';
    }

    function addToCart() {
        const qty = document.getElementById('qty').value;
        if (!selectedItem || !qty) return tg.showAlert("សូមរើសទំនិញ និងដាក់ចំនួន!");
        cart.push({ ...selectedItem, qty: qty });
        renderCart();
        document.getElementById('itemSearch').value = '';
        document.getElementById('qty').value = '';
        selectedItem = null;
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        list.innerHTML = cart.map((item, i) => `<div class="cart-item"><span>${i+1}. ${item.name}</span> <span>${item.qty} ${item.unit}</span></div>`).join('');
    }

    async function submitAll() {
        if (cart.length === 0) return tg.showAlert("សូមបន្ថែមទំនិញសិន!");
        const photos = document.getElementById('photoFile').files;
        if (photos.length === 0) return tg.showAlert("សូមថតរូបបុងសិន!");

        const btn = document.getElementById('btnAll');
        btn.disabled = true; btn.innerText = "កំពុងដំណើរការ...";

        try {
            // បញ្ជូនទិន្នន័យ (បញ្ជូនតែលេខកូដទៅកាន់ Sheet)
            const payload = {
                selectedDate: document.getElementById('formDate').value,
                depot: document.getElementById('depotList').value,
                zone: document.getElementById('zoneList').value,
                items: cart.map(item => ({ code: item.code, name: item.name, qty: item.qty, unit: item.unit })),
                telegramId: tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "6557953237"
            };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });

            // ផ្ញើរូបភាពទៅ Telegram
            for (let i = 0; i < photos.length; i++) {
                const fd = new FormData();
                fd.append('chat_id', GROUP_ID);
                fd.append('photo', photos[i]);
                fd.append('caption', `📸 រូបបុងទី ${i+1}/${photos.length}\n👤 ដោយ៖ ` + (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "User"));
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }

            tg.showAlert("✅ រក្សាទុក និងផ្ញើរូបភាពជោគជ័យ!");
            tg.close();
        } catch (e) {
            tg.showAlert("❌ កំហុស៖ " + e);
            btn.disabled = false; btn.innerText = "💾 រក្សាទុក និងផ្ញើទៅ Group";
        }
    }
</script>
</body>
</html>
