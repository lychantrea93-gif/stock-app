<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { color: #0088cc; margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-top: 8px; }
        input, select { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
        
        /* បញ្ជីទំនិញដែលបានរើស */
        #cartList { margin-top: 10px; border-top: 2px dashed #eee; padding-top: 10px; }
        .cart-item { background: #f9f9f9; padding: 8px; border-radius: 6px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 13px; border-left: 4px solid #0088cc; }
        
        .btn-add { background: #ff9800; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .btn-submit { background: #0088cc; color: white; border: none; width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; margin-top: 15px; width: 100%; display: none; }
        .btn-photo { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        
        .results { border: 1px solid #ddd; max-height: 120px; overflow-y: auto; display: none; background: white; position: absolute; width: calc(100% - 50px); z-index: 100; }
        .item-row { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3>📝 ព័ត៌មានរួម</h3>
    <label>ថ្ងៃខែក្នុងបុង:</label>
    <input type="date" id="formDate">
    <label>ដេប៉ូ & តំបន់:</label>
    <select id="depotList"></select>
    <select id="zoneList" style="margin-top: 5px;"></select>
</div>

<div class="card">
    <h3>📦 រើសទំនិញបញ្ចូលបញ្ជី</h3>
    <input type="text" id="itemSearch" placeholder="ស្វែងរកទំនិញ..." onkeyup="searchItem()">
    <div id="resBox" class="results"></div>
    <input type="number" id="qty" placeholder="បញ្ចូលចំនួន..." style="margin-top: 10px;">
    <button class="btn-add" onclick="addToCart()">➕ ថែមចូលបញ្ជីរង់ចាំ</button>

    <div id="cartList"></div>
    <button class="btn-submit" id="btnSaveAll" onclick="sendAllData()">💾 រក្សាទុកទំនិញទាំងអស់ចូល Sheet</button>
</div>

<div class="card" style="border-left: 5px solid #28a745;">
    <h3>📸 ថតរូបបុង (រហូតដល់ ១០ សន្លឹក)</h3>
    <input type="file" id="photoFile" accept="image/*" capture="environment" multiple>
    <button class="btn-photo" id="btnPhoto" onclick="sendPhotos()">ផ្ញើរូបភាពចូល Group</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYDhx-a1ZZBU5J731vnW6O0DDYLVRWDCkGZOCRM7P4dYChPEtBwiW00Dl0CHSmiTu3/exec";
    const BOT_TOKEN = "8627994315:AAFAsEe3IlsHx7r4K1jExKbB4ETu_F4eDOk";
    const GROUP_ID = "-1003907340354";

    let db = { items: [] }, cart = [], selectedItem = null;

    document.getElementById('formDate').valueAsDate = new Date();
    fetch(SCRIPT_URL).then(r => r.json()).then(res => {
        db = res;
        res.depots.forEach(d => document.getElementById('depotList').add(new Option(d, d)));
        res.zones.forEach(z => document.getElementById('zoneList').add(new Option(z, z)));
    });

    function searchItem() {
        const val = document.getElementById('itemSearch').value.toLowerCase();
        const box = document.getElementById('resBox');
        box.innerHTML = '';
        if (val.length < 1) { box.style.display = 'none'; return; }
        db.items.filter(i => i.name.toLowerCase().includes(val)).slice(0, 10).forEach(i => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `<strong>${i.name}</strong> (${i.unit})`;
            div.onclick = () => { selectedItem = i; document.getElementById('itemSearch').value = i.name; box.style.display = 'none'; };
            box.appendChild(div);
        });
        box.style.display = 'block';
    }

    function addToCart() {
        const qty = document.getElementById('qty').value;
        if (!selectedItem || !qty) return tg.showAlert("សូមរើសទំនិញ និងដាក់ចំនួន!");
        
        cart.push({ ...selectedItem, qty: qty });
        renderCart();
        
        // សម្អាតកន្លែងរើសទំនិញដើម្បីរើសមុខក្រោយទៀត
        document.getElementById('itemSearch').value = '';
        document.getElementById('qty').value = '';
        selectedItem = null;
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        list.innerHTML = '<strong>ទំនិញក្នុងបញ្ជី៖</strong>';
        cart.forEach((item, index) => {
            list.innerHTML += `<div class="cart-item"><span>${index+1}. ${item.name}</span> <span>${item.qty} ${item.unit}</span></div>`;
        });
        document.getElementById('btnSaveAll').style.display = cart.length > 0 ? 'block' : 'none';
    }

    function sendAllData() {
        const btn = document.getElementById('btnSaveAll');
        btn.disabled = true; btn.innerText = "កំពុងរក្សាទុក...";

        const payload = {
            selectedDate: document.getElementById('formDate').value,
            depot: document.getElementById('depotList').value,
            zone: document.getElementById('zoneList').value,
            items: cart,
            telegramId: tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "6557953237"
        };

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(() => { tg.showAlert("ជោគជ័យ! ទិន្នន័យទាំងអស់ត្រូវបានរក្សាទុក។"); tg.close(); });
    }

    async function sendPhotos() {
        const files = document.getElementById('photoFile').files;
        if (files.length === 0) return tg.showAlert("សូមរើសរូបភាព!");
        
        const btn = document.getElementById('btnPhoto');
        btn.disabled = true; btn.innerText = "កំពុងផ្ញើ...";

        for (let i = 0; i < files.length; i++) {
            const fd = new FormData();
            fd.append('chat_id', GROUP_ID);
            fd.append('photo', files[i]);
            fd.append('caption', `📸 រូបទី ${i+1}/${files.length}`);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }
        tg.showAlert("ផ្ញើរូបភាពរួចរាល់!");
        btn.disabled = false; btn.innerText = "ផ្ញើរូបភាពចូល Group";
    }
</script>
</body>
</html>
